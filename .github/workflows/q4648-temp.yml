name: Q4648 exact temporary computation

on:
  pull_request:
    branches:
      - main
    paths:
      - q4648-trigger.txt
  push:
    branches:
      - main
    paths:
      - scripts/q4648_compute_temp.py
      - .github/workflows/q4648-temp.yml

permissions:
  contents: read

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check sympy matplotlib
      - name: Compute through n=200
        run: python scripts/q4648_compute_temp.py
      - name: Upload exact outputs
        uses: actions/upload-artifact@v4
        with:
          name: q4648-exact-results
          path: q4648-temp-out/
          if-no-files-found: error

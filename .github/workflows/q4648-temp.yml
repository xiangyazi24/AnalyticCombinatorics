name: Q4648 exact temporary computation

on:
  push:
    branches:
      - main
    paths:
      - scripts/q4648_compute_temp.py
      - .github/workflows/q4648-temp.yml

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check sympy matplotlib
      - name: Compute through n=200
        run: python scripts/q4648_compute_temp.py
      - name: Commit exact outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add q4648-temp-out/
          git commit -m "Record temporary Q4648 exact outputs"
          git push
